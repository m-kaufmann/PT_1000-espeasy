esphome:
  name: pt1000-solar
  friendly_name: PT1000_Solar

esp8266:
  board: nodemcuv2

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid_pt1000_solar
  password: !secret wifi_password_pt1000_solar
  min_auth_mode: WPA2

  ap:
    ssid: "PT1000_Solar_Fallback"
    password: "vitacola"

captive_portal:

# SPI Bus (angepasst auf MAX31865 Beschriftung)
spi:
  clk_pin: GPIO14    # D5  -> CLK
  mosi_pin: GPIO13   # D7  -> SDI (Data IN am MAX31865)
  miso_pin: GPIO12   # D6  -> SDO (Data OUT vom MAX31865)

# Referenzwiderstände:
# 1 = 4247 Ohm
# 2 = 4265 Ohm
# 3 = 4267 Ohm
# 4 = 4260 Ohm

sensor:
  # MAX Nr. 1
  - platform: max31865
    name: "kollektor_1"
    cs_pin: GPIO5     # D1
    reference_resistance: 4247.0
    rtd_nominal_resistance: 1000.0
    rtd_wires: 2
    mains_filter: 50HZ
    update_interval: 5000ms
    filters:
      - lambda: |-
          if (isnan(x)) return {};
          if (x <= -20.0 || x >= 200.0) return {};
          return x;
      - sliding_window_moving_average:
          window_size: 3
          send_every: 3
      - round: 1

  # MAX Nr. 2
  - platform: max31865
    name: "kollektor_2"
    cs_pin: GPIO0     # D3
    reference_resistance: 4265.0
    rtd_nominal_resistance: 1000.0
    rtd_wires: 2
    mains_filter: 50HZ
    update_interval: 5000ms
    filters:
      - lambda: |-
          if (isnan(x)) return {};
          if (x <= -20.0 || x >= 200.0) return {};
          return x;
      - sliding_window_moving_average:
          window_size: 3
          send_every: 3
      - round: 1

  # MAX Nr. 3
  - platform: max31865
    name: "solar_vorlauf"
    cs_pin: GPIO4     # D2
    reference_resistance: 4267.0
    rtd_nominal_resistance: 1000.0
    rtd_wires: 2
    mains_filter: 50HZ
    update_interval: 5000ms
    filters:
      - lambda: |-
          if (isnan(x)) return {};
          if (x <= 0 || x >= 100.0) return {};
          return x;
      - sliding_window_moving_average:
          window_size: 3
          send_every: 3
      - round: 1

  # MAX Nr. 4
  - platform: max31865
    name: "solar_ruecklauf"
    cs_pin: GPIO16     # D0
    reference_resistance: 4260.0
    rtd_nominal_resistance: 1000.0
    rtd_wires: 2
    mains_filter: 50HZ
    update_interval: 5000ms
    filters:
      - lambda: |-
          if (isnan(x)) return {};
          if (x <= 0 || x >= 100.0) return {};
          return x;
      - sliding_window_moving_average:
          window_size: 3
          send_every: 3
      - round: 1